openapi: 3.0.3
info:
  title: Fenmo Expense Tracker API
  description: API documentation for the Fenmo full-stack expense tracker application.
  version: 1.0.0
servers:
  - url: http://localhost:4000/api
    description: Local development server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    Expense:
      type: object
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: number
        description:
          type: string
        date:
          type: string
          format: date-time
        categoryId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        idempotencyKey:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - amount
        - description
        - date
        - categoryId
        - userId
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                name:
                  type: string
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
        '400':
          description: Validation error or User already exists

  /auth/login:
    post:
      summary: Login to account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
        '401':
          description: Invalid email or password

  /expenses:
    get:
      summary: Get all expenses for the authenticated user
      parameters:
        - in: query
          name: category
          schema:
            type: string
            format: uuid
          description: Filter expenses by specific category ID
        - in: query
          name: sortOn
          schema:
            type: string
            enum: [updatedAt, date, amount]
          description: Property to sort expenses by
        - in: query
          name: sortDir
          schema:
            type: string
            enum: [asc, desc]
          description: Direction to sort expenses
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Pagination offset page index
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Pagination item limit limit
      responses:
        '200':
          description: List of expenses
          content:
            application/json:
              schema:
                type: object
                properties:
                  expenses:
                    type: array
                    items:
                      $ref: '#/components/schemas/Expense'
                  hasMore:
                    type: boolean
                  total:
                    type: integer
    post:
      summary: Create a new expense
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            type: string
            format: uuid
          required: true
          description: UUID for preventing duplicate requests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - description
                - date
                - categoryId
              properties:
                amount:
                  type: number
                description:
                  type: string
                date:
                  type: string
                  format: date-time
                categoryId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Expense successfully created
        '200':
          description: Expense previously recorded (Idempotent replay)
        '400':
          description: Missing idempotency key or validation failure
          
  /categories:
    get:
      summary: Get all available expense categories
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
